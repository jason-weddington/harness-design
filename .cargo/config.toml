# Cross-compilation linker for the aarch64 dispatch hosts (Pi fleet).
# `scripts/publish-talos.sh` builds an aarch64-unknown-linux-gnu release here on
# the x86_64 i9 and ships it to pi-04; that target needs the cross linker
# (Debian/Ubuntu package `gcc-aarch64-linux-gnu`). Native x86_64 builds are
# unaffected.
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
