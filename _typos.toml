# Project vocabulary for the `typos` spell checker. Add real domain terms /
# proper nouns under extend-words so legitimate identifiers aren't flagged.
[default.extend-words]
aci = "aci"   # agent-computer interface (Anthropic's term), not a typo of ACPI

[files]
# `fixtures/*` are eval inputs, not project code — the workspace `exclude`s
# them from cargo, and typos skips them here for the same reason: a fixture
# may deliberately contain non-standard identifiers or partial-word test
# vectors (e.g. `"caf"` — the truncated "café" — in the text-preview fixture).
extend-exclude = ["CHANGELOG.md", "*.lock", "fixtures/**"]
